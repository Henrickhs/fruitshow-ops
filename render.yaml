services:
  - type: web
    name: fruitshow-ops-api
    runtime: node
    plan: free
    rootDir: api
    buildCommand: npm install && npm run build && npm run deploy:seed
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: WEB_ORIGIN
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: UPLOAD_DIR
        value: ./uploads
